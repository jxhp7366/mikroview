<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MikroView — MK Olivo 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --bg: #0f1117; --card: #1a1d27; --accent: #3b82f6; }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; -webkit-text-size-adjust: 100%; }
    .card { background: var(--card); border: 1px solid #2a2d37; border-radius: 12px; }
    .metric-value { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 700; }
    .metric-sm { font-size: clamp(0.9rem, 2.5vw, 1.5rem); font-weight: 700; }
    .wan-up { color: #22c55e; } .wan-down { color: #ef4444; }
    .alert-critical { border-left: 3px solid #ef4444; }
    .alert-high { border-left: 3px solid #f97316; }
    .alert-medium { border-left: 3px solid #eab308; }
    .navbar { background: var(--card) !important; border-bottom: 1px solid #2a2d37; }
    .refresh-dot { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .threat-row { font-size: .75rem; font-family: monospace; word-break: break-all; }
    .wan-badge { font-size: clamp(.7rem, 2vw, .85rem); }
    @media (max-width: 576px) {
      .navbar-brand { font-size: 1rem; }
      .card { padding: .6rem !important; }
      .card-body { padding: .5rem !important; }
      canvas { max-height: 140px !important; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-2 px-md-3">
  <span class="navbar-brand mb-0 h1"><i class="bi bi-router"></i> <span class="d-none d-sm-inline">MikroView</span></span>
  <div class="d-flex align-items-center gap-2">
    <span class="text-muted small d-none d-sm-inline" id="clock">--</span>
    <span class="badge bg-success refresh-dot" id="statusDot">●</span>
    <a href="/logout" class="btn btn-outline-secondary btn-sm"><i class="bi bi-box-arrow-right"></i></a>
  </div>
</nav>

<div class="container-fluid px-2 px-md-3 py-2">
  <!-- Row 1: Métricas clave -->
  <div class="row g-2 mb-2">
    <div class="col-6 col-md-3">
      <div class="card p-2 p-md-3 text-center h-100">
        <small class="text-muted">CPU</small>
        <div class="metric-value" id="cpu">--%</div>
        <div class="progress mt-1" style="height:5px"><div class="progress-bar" id="cpuBar"></div></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-2 p-md-3 text-center h-100">
        <small class="text-muted">RAM</small>
        <div class="metric-value" id="ram">--</div>
        <small class="text-muted d-none d-md-inline" id="ramDetail"></small>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card p-2 p-md-3 text-center h-100">
        <small class="text-muted">Clientes</small>
        <div class="metric-value" id="clients">--</div>
        <small class="text-muted" style="font-size:.7rem">PPPoE</small>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card p-2 p-md-3 text-center h-100">
        <small class="text-muted">Uptime</small>
        <div class="metric-sm" id="uptime">--</div>
      </div>
    </div>
    <div class="col-12 col-md-2">
      <div class="card p-2 p-md-3 h-100">
        <small class="text-muted mb-1">WAN</small>
        <div class="d-flex flex-column gap-1" id="wanStatus"></div>
      </div>
    </div>
  </div>

  <!-- Row 2: Gráfico CPU -->
  <div class="row g-2 mb-2">
    <div class="col-12">
      <div class="card p-2 p-md-3">
        <small class="text-muted mb-1"><i class="bi bi-graph-up"></i> CPU</small>
        <div style="position:relative; height: clamp(140px, 30vw, 180px);">
          <canvas id="cpuChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 3: Alertas -->
  <div class="row g-2">
    <div class="col-12">
      <div class="card p-2 p-md-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <small class="text-muted"><i class="bi bi-shield-exclamation"></i> Alertas</small>
          <div class="d-flex gap-1">
            <a href="/certs/ca" class="btn btn-outline-secondary btn-sm py-0 px-1" title="Descargar CA"><i class="bi bi-download"></i> <span class="d-none d-sm-inline">SSL</span></a>
          </div>
        </div>
        <div id="threats" class="overflow-auto" style="max-height:200px">
          <small class="text-muted">Cargando...</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="text-center text-muted small mt-2 pb-2">
    MK Olivo 1 · <span id="rosVersion">--</span> · 
    <span id="lastUpdate">--</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4/dist/chart.umd.min.js"></script>
<script>
const MAX_POINTS = 30;
const cpuHistory = [];

let cpuChart;

function initChart() {
  const ctx = document.getElementById('cpuChart').getContext('2d');
  cpuChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v+'%', font: { size: 10 } }, grid: { color: '#2a2d37' } },
        x: { display: false }
      }
    }
  });
}

async function refresh() {
  try {
    const r = await fetch('/api/all');
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    const d = j.data;
    
    // Métricas
    document.getElementById('cpu').textContent = d.status.cpu + '%';
    document.getElementById('cpuBar').style.width = d.status.cpu + '%';
    document.getElementById('cpuBar').className = 'progress-bar ' + 
      (d.status.cpu > 80 ? 'bg-danger' : d.status.cpu > 60 ? 'bg-warning' : 'bg-success');
    
    document.getElementById('ram').textContent = d.status.memory_used_pct + '%';
    const ramEl = document.getElementById('ramDetail');
    if (ramEl) ramEl.textContent = d.status.memory_free_mb + ' MB libre';
    
    document.getElementById('clients').textContent = d.clients;
    document.getElementById('uptime').textContent = d.status.uptime;
    document.getElementById('rosVersion').textContent = d.status.version;
    
    // CPU chart — arreglado: usa .data directamente, no reasigna referencia
    if (cpuChart) {
      cpuHistory.push(d.status.cpu);
      while (cpuHistory.length > MAX_POINTS) cpuHistory.shift();
      cpuChart.data.labels = cpuHistory.map(() => '');
      cpuChart.data.datasets[0].data = [...cpuHistory]; // nueva copia
      cpuChart.update('none');
    }
    
    // WAN
    const wanDiv = document.getElementById('wanStatus');
    wanDiv.innerHTML = d.wan.map(w => 
      `<span class="badge wan-badge ${w.running ? 'bg-success bg-opacity-25 text-success' : 'bg-danger bg-opacity-25 text-danger'}">
        ${w.comment || w.name}: ${w.running ? 'UP' : 'DOWN'}
      </span>`
    ).join('');
    
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    document.getElementById('statusDot').className = 'badge bg-success refresh-dot';
  } catch(e) {
    document.getElementById('statusDot').className = 'badge bg-danger';
    console.error(e);
  }
}

async function refreshThreats() {
  try {
    const r = await fetch('/api/logs');
    const j = await r.json();
    const threats = j.data?.threats || [];
    const div = document.getElementById('threats');
    if (threats.length === 0) {
      div.innerHTML = '<small class="text-success">✅ Sin amenazas detectadas</small>';
      return;
    }
    div.innerHTML = threats.slice(-15).reverse().map(t => 
      `<div class="alert-${t.severity} bg-dark p-1 px-2 mb-1 rounded threat-row">
        <span class="text-${t.severity==='critical'?'danger':t.severity==='high'?'warning':'info'}">●</span>
        ${t.message}
      </div>`
    ).join('');
  } catch(e) { console.error(e); }
}

// Reloj
setInterval(() => {
  const clk = document.getElementById('clock');
  if (clk) clk.textContent = new Date().toLocaleTimeString();
}, 1000);

initChart();
refresh();
refreshThreats();
setInterval(refresh, 15000);
setInterval(refreshThreats, 60000);
</script>
</body>
</html>
