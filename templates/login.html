<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MikroView — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; }
    .login-card { background: #1a1d27; border: 1px solid #2a2d37; border-radius: 12px; width: 100%; max-width: 380px; }
  </style>
</head>
<body>
<div class="login-card p-4">
  <div class="text-center mb-4">
    <h3><i class="bi bi-router" style="color:#3b82f6"></i> MikroView</h3>
    <small class="text-muted">MK Olivo 1 · RB5009UG+S+</small>
  </div>
  
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  
  <form method="POST">
    <div class="mb-3">
      <label class="form-label small">Usuario</label>
      <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label small">Contraseña</label>
      <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
  </form>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
