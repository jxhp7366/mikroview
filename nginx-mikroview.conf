server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate /home/ouc/mikroview/certs/cert.pem;
    ssl_certificate_key /home/ouc/mikroview/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=mikroview:10m rate=5r/s;
    limit_req zone=mikroview burst=10 nodelay;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check without auth
    location /health {
        proxy_pass http://127.0.0.1:5050/health;
        proxy_set_header Host $host;
    }

    # Allow cert download
    location /certs/ {
        proxy_pass http://127.0.0.1:5050/certs/;
        proxy_set_header Host $host;
    }
}
